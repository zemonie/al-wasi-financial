<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Al-Wasi Financial - Laporan Keuangan & Export PDF">
    <title>Al-Wasi Financial — Laporan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/laporan.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <main class="main-content">
            <header class="top-header" id="topHeader"></header>
            <div class="content-area">
                <div class="page-heading">
                    <h1>Laporan Keuangan</h1>
                    <p>Ringkasan dan analisis keuangan berdasarkan periode</p>
                </div>

                <!-- Period Selector -->
                <div class="period-selector-card">
                    <div class="period-controls">
                        <div class="period-group">
                            <label for="laporanBulan">Bulan</label>
                            <select id="laporanBulan">
                                <option value="0">Januari</option>
                                <option value="1">Februari</option>
                                <option value="2">Maret</option>
                                <option value="3" selected>April</option>
                                <option value="4">Mei</option>
                                <option value="5">Juni</option>
                                <option value="6">Juli</option>
                                <option value="7">Agustus</option>
                                <option value="8">September</option>
                                <option value="9">Oktober</option>
                                <option value="10">November</option>
                                <option value="11">Desember</option>
                            </select>
                        </div>
                        <div class="period-group">
                            <label for="laporanTahun">Tahun</label>
                            <select id="laporanTahun">
                                <option value="2024">2024</option>
                                <option value="2025">2025</option>
                                <option value="2026" selected>2026</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" id="btnGenerateLaporan">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                            Tampilkan Laporan
                        </button>
                        <button class="btn btn-accent" id="btnExportPdf">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                            Export PDF
                        </button>
                    </div>
                </div>

                <!-- Report Summary -->
                <div class="report-summary" id="reportSummary">
                    <div class="report-cards">
                        <div class="report-card income-card">
                            <span class="rc-label">Total Pemasukan</span>
                            <span class="rc-value" id="rptPemasukan">Rp 0</span>
                        </div>
                        <div class="report-card expense-card">
                            <span class="rc-label">Total Pengeluaran</span>
                            <span class="rc-value" id="rptPengeluaran">Rp 0</span>
                        </div>
                        <div class="report-card balance-card">
                            <span class="rc-label">Selisih (Laba/Rugi)</span>
                            <span class="rc-value" id="rptSelisih">Rp 0</span>
                        </div>
                        <div class="report-card count-card">
                            <span class="rc-label">Jumlah Transaksi</span>
                            <span class="rc-value" id="rptJumlah">0</span>
                        </div>
                    </div>
                </div>

                <!-- Report Chart -->
                <div class="report-charts">
                    <div class="chart-card">
                        <div class="chart-header">
                            <h2>Perbandingan Harian</h2>
                        </div>
                        <div class="chart-body">
                            <canvas id="reportBarChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-card">
                        <div class="chart-header">
                            <h2>Distribusi Kategori</h2>
                        </div>
                        <div class="chart-body">
                            <canvas id="reportPieChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Report Detail Table -->
                <div class="report-table-card">
                    <div class="section-header">
                        <h2>Detail Transaksi Periode Ini</h2>
                    </div>
                    <div class="table-wrapper">
                        <table class="data-table" id="reportTable">
                            <thead>
                                <tr>
                                    <th>Tanggal</th>
                                    <th>Keterangan</th>
                                    <th>Kategori</th>
                                    <th>Tipe</th>
                                    <th>Nominal</th>
                                </tr>
                            </thead>
                            <tbody id="reportBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/laporan.js"></script>
</body>
</html>
