<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Al-Wasi Financial - Dashboard utama laporan keuangan">
    <title>Al-Wasi Financial — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar"></aside>

        <!-- Overlay for mobile -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Header -->
            <header class="top-header" id="topHeader"></header>

            <!-- Dashboard Content -->
            <div class="content-area">
                <!-- Summary Cards -->
                <div class="summary-cards">
                    <div class="summary-card card-saldo">
                        <div class="card-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                        </div>
                        <div class="card-info">
                            <span class="card-label">Total Saldo</span>
                            <span class="card-value" id="totalSaldo">Rp 0</span>
                            <span class="card-change positive" id="saldoChange">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
                                +0% dari bulan lalu
                            </span>
                        </div>
                    </div>
                    <div class="summary-card card-pemasukan">
                        <div class="card-icon income">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
                        </div>
                        <div class="card-info">
                            <span class="card-label">Pemasukan Bulan Ini</span>
                            <span class="card-value" id="totalPemasukan">Rp 0</span>
                            <span class="card-change positive" id="pemasukanChange">+0%</span>
                        </div>
                    </div>
                    <div class="summary-card card-pengeluaran">
                        <div class="card-icon expense">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>
                        </div>
                        <div class="card-info">
                            <span class="card-label">Pengeluaran Bulan Ini</span>
                            <span class="card-value" id="totalPengeluaran">Rp 0</span>
                            <span class="card-change negative" id="pengeluaranChange">+0%</span>
                        </div>
                    </div>
                    <div class="summary-card card-transaksi">
                        <div class="card-icon transactions">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                        </div>
                        <div class="card-info">
                            <span class="card-label">Transaksi Bulan Ini</span>
                            <span class="card-value" id="totalTransaksi">0</span>
                            <span class="card-change neutral" id="transaksiChange">0 transaksi</span>
                        </div>
                    </div>
                </div>

                <!-- Charts Row -->
                <div class="charts-row">
                    <div class="chart-card chart-bar">
                        <div class="chart-header">
                            <div>
                                <h2>Pemasukan vs Pengeluaran</h2>
                                <div class="chart-legend">
                                    <span class="legend-item"><span class="legend-dot income"></span>Pemasukan</span>
                                    <span class="legend-item"><span class="legend-dot expense"></span>Pengeluaran</span>
                                </div>
                            </div>
                            <div class="chart-actions">
                                <div class="period-selector" id="chartPeriodSelector">
                                    <button class="period-btn active" data-period="6m">6B</button>
                                    <button class="period-btn" data-period="1y">1Y</button>
                                    <button class="period-btn" data-period="2y">2Y</button>
                                    <button class="period-btn" data-period="5y">5Y</button>
                                    <button class="period-btn" data-period="10y">10Y</button>
                                </div>
                            </div>
                        </div>
                        <div class="chart-body">
                            <canvas id="barChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-card chart-pie">
                        <div class="chart-header">
                            <div>
                                <h2>Pengeluaran per Kategori</h2>
                            </div>
                        </div>
                        <div class="chart-body">
                            <canvas id="pieChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Recent Transactions -->
                <div class="recent-transactions">
                    <div class="section-header">
                        <h2>Transaksi Terbaru</h2>
                        <a href="riwayat.html" class="btn-link">Lihat Semua →</a>
                    </div>
                    <div class="transactions-table-wrapper">
                        <table class="transactions-table" id="recentTransactionsTable">
                            <thead>
                                <tr>
                                    <th>Tanggal</th>
                                    <th>Keterangan</th>
                                    <th>Kategori</th>
                                    <th>Tipe</th>
                                    <th>Nominal</th>
                                </tr>
                            </thead>
                            <tbody id="recentTransactionsBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
