<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Al-Wasi Financial - Riwayat Transaksi Keuangan">
    <title>Al-Wasi Financial — Riwayat Transaksi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/riwayat.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <main class="main-content">
            <header class="top-header" id="topHeader"></header>
            <div class="content-area">
                <div class="page-heading">
                    <h1>Riwayat Transaksi</h1>
                    <p>Daftar lengkap semua transaksi keuangan</p>
                </div>

                <!-- Filters -->
                <div class="filters-card">
                    <div class="filters-row">
                        <div class="filter-group">
                            <label for="filterSearch">Cari</label>
                            <div class="search-input-wrapper">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                                <input type="text" id="filterSearch" placeholder="Cari keterangan...">
                            </div>
                        </div>
                        <div class="filter-group">
                            <label for="filterTipe">Tipe</label>
                            <select id="filterTipe">
                                <option value="">Semua</option>
                                <option value="pemasukan">Pemasukan</option>
                                <option value="pengeluaran">Pengeluaran</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label for="filterKategori">Kategori</label>
                            <select id="filterKategori">
                                <option value="">Semua</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label for="filterDari">Dari Tanggal</label>
                            <input type="date" id="filterDari">
                        </div>
                        <div class="filter-group">
                            <label for="filterSampai">Sampai Tanggal</label>
                            <input type="date" id="filterSampai">
                        </div>
                        <div class="filter-group filter-actions">
                            <button class="btn btn-secondary btn-sm" id="btnResetFilter">Reset</button>
                        </div>
                    </div>
                </div>

                <!-- Table -->
                <div class="table-card">
                    <div class="table-info">
                        <span id="tableCount">0 transaksi</span>
                    </div>
                    <div class="table-wrapper">
                        <table class="data-table" id="riwayatTable">
                            <thead>
                                <tr>
                                    <th>Tanggal</th>
                                    <th>Keterangan</th>
                                    <th>Kategori</th>
                                    <th>Tipe</th>
                                    <th>Nominal</th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="riwayatBody">
                            </tbody>
                        </table>
                    </div>
                    <div class="table-pagination" id="pagination">
                    </div>
                    <div class="empty-state" id="emptyState" style="display:none">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        <p>Tidak ada transaksi ditemukan</p>
                    </div>
                </div>

                <!-- Delete Confirmation Modal -->
                <div class="modal-overlay" id="deleteModal" style="display:none">
                    <div class="modal-card">
                        <div class="modal-icon danger">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </div>
                        <h3>Hapus Transaksi?</h3>
                        <p>Transaksi yang dihapus tidak dapat dikembalikan.</p>
                        <div class="modal-actions">
                            <button class="btn btn-secondary" id="btnCancelDelete">Batal</button>
                            <button class="btn btn-danger" id="btnConfirmDelete">Hapus</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/riwayat.js"></script>
</body>
</html>
