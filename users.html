<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Al-Wasi Financial - Manajemen User">
    <title>Al-Wasi Financial — Manajemen User</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/users.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <main class="main-content">
            <header class="top-header" id="topHeader"></header>
            <div class="content-area">
                <div class="page-heading">
                    <h1>Manajemen User</h1>
                    <p>Kelola pengguna yang memiliki akses ke sistem</p>
                </div>

                <div class="user-actions-bar">
                    <button class="btn btn-primary" id="btnAddUser">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                        Tambah User Baru
                    </button>
                </div>

                <div class="table-card">
                    <div class="table-wrapper">
                        <table class="data-table" id="usersTable">
                            <thead>
                                <tr>
                                    <th>Nama</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Status</th>
                                    <th>Terakhir Login</th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="usersBody">
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Add/Edit User Modal -->
                <div class="modal-overlay" id="userModal" style="display:none">
                    <div class="modal-card modal-form">
                        <div class="modal-header">
                            <h3 id="userModalTitle">Tambah User Baru</h3>
                            <button class="modal-close" id="btnCloseUserModal">&times;</button>
                        </div>
                        <form id="userForm">
                            <input type="hidden" id="editUserId" value="">
                            <div class="form-group">
                                <label for="userName">Nama Lengkap</label>
                                <input type="text" id="userName" required placeholder="Masukkan nama lengkap">
                            </div>
                            <div class="form-group">
                                <label for="userEmail">Email</label>
                                <input type="email" id="userEmail" required placeholder="email@perusahaan.com">
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="userRole">Role</label>
                                    <select id="userRole" required>
                                        <option value="user">User</option>
                                        <option value="admin">Admin</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="userStatus">Status</label>
                                    <select id="userStatus" required>
                                        <option value="active">Aktif</option>
                                        <option value="inactive">Nonaktif</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group" id="passwordGroup">
                                <label for="userPassword">Password</label>
                                <input type="password" id="userPassword" placeholder="Minimal 6 karakter">
                            </div>
                            <div class="form-actions">
                                <button type="button" class="btn btn-secondary" id="btnCancelUser">Batal</button>
                                <button type="submit" class="btn btn-primary" id="btnSaveUser">Simpan</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/users.js"></script>
</body>
</html>
